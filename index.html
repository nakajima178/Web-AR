<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>model.glb テスト</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.136.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.136.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 16px;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
      pointer-events: none;
    }
    #version {
      color: rgba(255,255,255,0.5);
      font-size: 11px;
    }
    #status {
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
    }
    #log {
      background: rgba(0,0,0,0.7);
      color: #0f0;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      max-width: 90%;
      word-break: break-all;
    }
    #hint {
      color: rgba(255,255,255,0.5);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <span id="version">v1 - model.glb テスト</span>
    <p id="status">model.glb を読み込み中...</p>
    <p id="log"></p>
    <p id="hint">指でドラッグすると回転できます</p>
  </div>

  <script>
    const status = document.getElementById('status');
    const log    = document.getElementById('log');

    // シーン
    const scene    = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera   = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 1, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // コントロール（指で回転）
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // ライト
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(1, 2, 2);
    scene.add(dir);

    // グリッド（地面の目安）
    scene.add(new THREE.GridHelper(4, 10, 0x444466, 0x333355));

    // model.glb 読み込み
    const loader = new THREE.GLTFLoader();
    loader.load(
      './model.glb',
      (gltf) => {
        const model = gltf.scene;

        // モデルをシーン中央に自動調整
        const box    = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 2 / maxDim; // 画面に収まるようにスケール
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));

        scene.add(model);
        status.textContent = '✅ model.glb 読み込み成功！';
        log.textContent = `サイズ: x=${size.x.toFixed(2)} y=${size.y.toFixed(2)} z=${size.z.toFixed(2)}`;
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          status.textContent = `読み込み中... ${pct}%`;
        }
      },
      (error) => {
        status.textContent = '❌ model.glb の読み込み失敗';
        log.textContent = error.message || 'ファイルが見つからないか壊れています';
        log.style.color = '#f55';
      }
    );

    // リサイズ対応
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // レンダリングループ
    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
